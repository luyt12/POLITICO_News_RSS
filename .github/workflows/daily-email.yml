name: Daily POLITICO EU News Email

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: latest | backfill'
        required: false
        default: 'latest'
        type: string
      backfill_days:
        description: 'Backfill days (only for backfill mode)'
        required: false
        default: '4'
        type: string

env:
  kimi_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  BAIDU_APPID: ${{ secrets.BAIDU_APPID }}
  BAIDU_API_KEY: ${{ secrets.BAIDU_API_KEY }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily task
        env:
          MODE: ${{ github.event.inputs.mode || 'latest' }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '4' }}
        run: python daily_task.py
      - name: Commit updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add processed_urls.json dailynews/ translate/
          git diff --staged --quiet || git commit -m "Update [skip ci]"
          git push
