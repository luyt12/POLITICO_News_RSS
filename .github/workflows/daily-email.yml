name: Daily POLITICO News Email

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  kimi_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily task
        run: python daily_task.py
      - name: Commit processed_urls.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add processed_urls.json dailynews/
          git diff --staged --quiet || git commit -m "Update processed URLs [skip ci]"
          git push
